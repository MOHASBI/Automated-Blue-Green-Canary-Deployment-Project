name: Terraform

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        type: choice
        options: [apply, destroy]
      confirm:
        description: 'Type CONFIRM'
        required: true
        type: string

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  scan:
    name: Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        scanner: [tflint, checkov]
      fail-fast: false
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: TFLint setup
        if: matrix.scanner == 'tflint'
        uses: terraform-linters/setup-tflint@v4
        
      - name: Run TFLint
        if: matrix.scanner == 'tflint'
        continue-on-error: true #temp
        run: |
          tflint --init
          tflint --recursive